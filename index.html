    // ==========================================
    // 5. DiagnosisResult Component
    // ==========================================
    function DiagnosisResult({ answers, onReset }) {
      const [selectedReportId, setSelectedReportId] = useState('GENERAL');
      const [checkedDocs, setCheckedDocs] = useState({});

      const evaluateAllFunds = (ans) => {
        const results = {};
        const ids = ['GENERAL', 'EMERGENCY', 'REFINANCE', 'GUARANTEE', 'REGIONAL'];

        for (const id of ids) {
          let score = 75; // 기준 기본점수
          const reasons = [];
          const warnings = [];
          const recommendations = [];
          let isHardFail = false;

          // --- 공통 부결 결격 요건 검사 ---
          if (ans.companyScale === 'LARGE' || ans.companyScale === 'OTHER') {
            isHardFail = true;
            score = 0;
            reasons.push('중소기업 및 소상공인 지원 범위를 전면 초과하는 대기업 또는 비영리 단체 자격 미충족');
          }

          if (ans.isExcludedIndustry) {
            isHardFail = true;
            score = 0;
            reasons.push('정책 융자 지원제외 부적합 사행성/유흥/투기임대 업종에 해당하여 원천 부결 대상');
          }

          if (ans.hasTaxDefault) {
            isHardFail = true;
            score = 0;
            reasons.push('국세 또는 지방세 세금 체납 상태로 공적 자금 지원 결격 발생');
            warnings.push('체납액이 소액이더라도 완납 증명서가 발급되지 않으면 신청 심사가 강제 보류 및 반려됩니다.');
            recommendations.push('즉시 국세청 홈택스 및 관할 세무서에 체납 세금을 모두 상환하여 납세 완료 상태를 입증하십시오.');
          }

          if (ans.hasCreditDelinquency) {
            isHardFail = true;
            score = 0;
            reasons.push('금융 기관 장기 연체 및 전국 신용 정보망 내 신용 불량자로 등재되어 원천 거절 대상');
            warnings.push('공공 연체 또는 사설 이자 지연 정보가 공유되어 심사가 전면 동결됩니다.');
            recommendations.push('연체금을 완전 변제하여 신용 회복 승인을 득하거나, 신용회복위원회의 공식 구조 제도를 통한 변제이행 실적을 증명해야 합니다.');
          }

          if (ans.isClosedOrSuspended) {
            isHardFail = true;
            score = 0;
            reasons.push('현재 사업체가 일시 휴업 중이거나 최종 폐업 상태에 해당');
            warnings.push('정책 대출은 가동 상태인 영업 주체에 실사하여 집행되는 원칙이 있어 원천 차단됩니다.');
            recommendations.push('사업장 영업을 재개하여 가동 중 서류를 갖추어 신청하시기 바랍니다.');
          }

          // --- 공통 부결에 걸리지 않았다면 개별 맞춤 평가 ---
          if (!isHardFail) {
            
            // 1. 일반경영안정자금 (GENERAL)
            if (id === 'GENERAL') {
              score = 70;
              if (ans.companyScale === 'MICRO' || ans.companyScale === 'SME') {
                score += 15;
                reasons.push('소상공인 및 소기업 법정 자격 요건 기본 충족');
              }
              if (ans.businessAge === 'OVER_3' || ans.businessAge === '1_TO_3') {
                score += 15;
                reasons.push('가동 업력 1년 이상의 안정적 영업 기반 증명');
              } else {
                score -= 15;
                warnings.push('업력 1년 미만 초기 단계: 일반 자금은 매출 기반 상환력 심사가 다소 무거워 신생 기업은 경쟁이 치열할 수 있습니다.');
                recommendations.push('매출 원천인 부가가치세 월별 추이를 적극 소명하여 심사 역량을 보완하십시오.');
              }
              if (ans.annualSales === 'OVER_500M') {
                score += 10;
                reasons.push('안정적 상환 재원이 예측되는 연 매출 5억 이상 탄탄한 외형 확보');
              } else if (ans.annualSales === 'UNDER_100M') {
                score -= 10;
                warnings.push('연 매출 1억 미만 영세 규모: 담보력이나 현금흐름 측면에서 한도 부여에 제약이 생길 수 있습니다.');
              }
              if (ans.salesTrend === 'INCREASING') {
                score += 10;
                reasons.push('매출 상승 가점으로 정책 융자 우선 배정 유리');
              }
            }

            // 2. 긴급경영안정자금 (EMERGENCY)
            else if (id === 'EMERGENCY') {
              score = 35;
              if (ans.hasDisasterOrCrisis) {
                score += 60;
                reasons.push('공인 재해 피해 사실 또는 객관적 원부자재 수급 위기 증빙 확인');
              } else {
                score -= 25;
                warnings.push('특별 재해 및 급격한 돌발 위기 사실 부재: 일반 단순 유동성 부족은 긴급 트랙의 심사 대상이 아닙니다.');
                recommendations.push('재해 상황이 아닌 경우 본 자금보다 범용성이 큰 [일반경영안정자금]이나 [신용보증재단 보증]을 노려야 합니다.');
              }
              if (ans.companyScale === 'MICRO' || ans.companyScale === 'SME') {
                score += 10;
              }
              if (ans.salesTrend === 'DECREASING') {
                score += 10;
                reasons.push('일시적인 급격한 매출 감소로 긴급 안정 유동성 긴급 지원 대상 부합');
              }
            }

            // 3. 소진공 대환대출 (REFINANCE)
            else if (id === 'REFINANCE') {
              score = 30;
              if (ans.companyScale === 'MICRO') {
                score += 25;
                reasons.push('지원 기준 핵심인 소상공인(MICRO) 주체 적격 판정');
              } else {
                score -= 20;
                warnings.push('소상공인 외 규모: 본 대환 대출은 오직 소상공인법상 5인 미만 차주만을 타겟으로 특별 편성되었습니다.');
                recommendations.push('소기업 규모 이상이실 경우 보증재단의 구조조정 전환 대출 트랙을 우회 활용하셔야 합니다.');
              }
              
              if (ans.hasHighInterestDebt) {
                score += 45;
                reasons.push('연 7% 이상의 은행권/제2금융 고금리 채무 증빙 충족');
              } else {
                score -= 40;
                warnings.push('연 7% 이상 고금리 금융 대출 미보유: 본 프로그램은 높은 사채/대출 이자 부담 구제용이라 신청이 반려됩니다.');
                recommendations.push('현재 고금리 저축은행이나 캐피탈 등의 유효 부채가 3개월 이상 성실 상환 중인지 대출원장을 정돈하세요.');
              }

              if (ans.creditScoreRange === 'LOW' || ans.creditScoreRange === 'MID') {
                score += 15;
                reasons.push('중·저신용 타겟층(NCB 839점 이하) 특별 우대 가점 적용');
              } else if (ans.creditScoreRange === 'HIGH') {
                score -= 20;
                warnings.push('고신용자(NCB 840점 이상): 신용도가 우량하여 저금리 전환 대출의 시급성 후순위로 평가될 수 있습니다.');
                recommendations.push('본 대환 트랙보다는 금리 보존이 되는 시중 은행 협약 [지역 특례 자금] 등이 유리합니다.');
              }
            }

            // 4. 신용보증재단 보증 (GUARANTEE)
            else if (id === 'GUARANTEE') {
              score = 60;
              if (ans.needCollateralSupport) {
                score += 25;
                reasons.push('담보 부족에 따른 공적 보증서(신용보증재단) 발급 당위성 완벽 소명');
              }
              if (ans.companyScale === 'MICRO') {
                score += 15;
                reasons.push('소상공인 우대 타겟 충족');
              }
              if (ans.creditScoreRange === 'HIGH' || ans.creditScoreRange === 'MID') {
                score += 15;
                reasons.push('신용도 우량 및 보상 변제 위험이 낮아 즉각 승인 등급 확보 가능');
              } else if (ans.creditScoreRange === 'LOW') {
                score -= 20;
                warnings.push('대표자 저신용 등급: 신보 자체적인 내부 보증 한도가 대폭 삭감되거나 거절 판정이 날 수 있습니다.');

              }
              if (ans.annualSales === 'OVER_500M' || ans.annualSales === '100M_TO_500M') {
                score += 10;
                reasons.push('매출 상환 능력을 추적하는 세무 매출 증빙 우량 판정');
              }
            }

            // 5. 지역 특례 자금 (REGIONAL)
            else if (id === 'REGIONAL') {
              score = 50;
              if (ans.hasLocalGovRecommendation) {
                score += 35;
                reasons.push('지자체 협약 추천서 획득 및 특별 이차보전 감면 요건 완료');
              } else {

                warnings.push('지자체 추천 또는 공인 협약 인증 누락: 이차보전 특별 금리 할인(1%~2.5%) 혜택이 미완성될 수 있습니다.');
